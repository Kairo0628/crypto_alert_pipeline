x-kafka-volumes:
  &kafka-volumes
  volumes:
    - ./kafka-logs/data:/logs/data
    - ./kafka-logs/metadata:/logs/metadata

services:
  kafka-init:
    image: busybox
    container_name: kafka-init
    <<: *kafka-volumes
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mkdir -v -p /logs/{data,metadata}

  broker:
    <<: *kafka-volumes
    image: apache/kafka:4.2.1
    container_name: broker
    ports:
      - "19092:19092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker:9092,EXTERNAL://localhost:19092

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_CONTROLLER_QUORUM_BOOTSTRAP_SERVERS: broker:9093

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_LOG_DIRS: /logs/data
      KAFKA_METADATA_LOG_DIR: /logs/metadata
      KAFKA_LOG_RETENTION_BYTES: 1073741824 # 1024 * 1024 * 1024 = 1GB
      KAFKA_LOG_SEGMENT_BYTES: 134217728 # 1024 * 1024 * 128 = 128MB
      KAFKA_LOG_RETENTION_HOURS: 168 # 24 * 7 = 7 Days

      # Producer측에서 key: code로 지정하고 있음. 종목이 4개이므로 4개의 파티션 사용
      KAFKA_NUM_PARTITIONS: 4

      # 브로커가 1개이므로 복제본에 대한 설정은 1로 지정
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # 컨슈머가 1개이므로 리밸런싱 지연 시간 필요 없음
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.8.15
    container_name: redpanda-console
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: broker:9092
    depends_on:
      - broker
